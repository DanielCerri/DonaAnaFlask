<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonaAna | Detalhes da Mesa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #D35400; 
            --primary-hover: #B04600;
            --bg-color: #F4F6F7; 
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --success-color: #27AE60;
            --danger-color: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 5%;
        }

        /* --- NAVEGAÇÃO --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-voltar {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .btn-voltar:hover {
            color: var(--primary-color);
        }

        /* --- CABEÇALHO DA MESA --- */
        .mesa-header-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mesa-info h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .mesa-info p {
            color: var(--text-muted);
        }

        .status-badge {
            background-color: #E8F8F5;
            color: var(--success-color);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- LAYOUT PRINCIPAL (Lista de Pedidos e Resumo) --- */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            border-bottom: 2px solid #F2F4F4;
            padding-bottom: 0.5rem;
        }

        /* --- TABELA DE PEDIDOS --- */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
        }

        .order-table th, 
        .order-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #EAECEE;
        }

        .order-table th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            background-color: #F8F9F9;
        }

        .btn-remover {
            color: var(--danger-color);
            background: none;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        /* --- RESUMO E TOTAL --- */
        .resumo-box {
            background-color: #F8F9F9;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .resumo-linha {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .resumo-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #D5D8DC;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn-encerrar {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-encerrar:hover {
            background-color: var(--primary-hover);
        }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="{{ url_for('painel') }}" class="btn-voltar">← Voltar ao Painel</a>
    </div>

    <div class="mesa-header-card">
        <div class="mesa-info">
            <h1>Mesa #01</h1>
            <p>Cliente: <strong>João Silva</strong></p>
        </div>
        <div class="status-badge">🟢 Em Atendimento</div>
    </div>

    <div class="content-grid">
        
        <div class="card">
            <h3>Itens Consumidos</h3>
            
            <div class="table-responsive">
                <table class="order-table">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Valor Unit.</th>
                            <th>Subtotal</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>X-Bacon Duplo</strong></td>
                            <td>R$ 32,90</td>
                            <td>R$ 65,80</td>
                            <td><button class="btn-remover">Remover</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>Resumo da Conta</h3>
            
            <div class="resumo-box">
                <div class="resumo-linha">
                    <span>Subtotal dos itens:</span>
                    <span>R$ 100,80</span>
                </div>
                <div class="resumo-linha">
                    <span>Taxa de serviço (10%):</span>
                    <span>R$ 10,08</span>
                </div>
                
                <div class="resumo-total">
                    <span>Total a Pagar:</span>
                    <span style="color: var(--primary-color);">R$ 110,88</span>
                </div>
            </div>

            <form action="/encerrar_mesa/1" method="POST" onsubmit="return confirm('Confirmar o pagamento e encerrar esta mesa?');">
                <button type="submit" class="btn-encerrar">💳 Encerrar e Pagar</button>
            </form>
        </div>

    </div>

</body>
</html>
